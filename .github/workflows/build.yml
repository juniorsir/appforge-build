name: AppForge Cloud Build

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'Unique ID of the app to build'
        required: true
        type: string

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Unzip Uploaded Source
        run: |
          TARGET_DIR="apps/${{ github.event.inputs.app_id }}"
          unzip -o "$TARGET_DIR/source.zip" -d app_workspace

      - name: Install JS Dependencies
        run: |
          cd app_workspace
          npm install

      - name: Build Web App
        run: |
          cd app_workspace
          npm run build --if-present
          
      # --- FIX IS HERE ---
      - name: Add Android Platform
        run: |
          cd app_workspace
          npm install @capacitor/android
          npx cap add android
      # -------------------

      - name: Capacitor Sync
        run: |
          cd app_workspace
          npx cap sync android

      - name: Build APK
        run: |
          cd app_workspace/android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appforge-apk-${{ github.event.inputs.app_id }}
          path: app_workspace/android/app/build/outputs/apk/debug/app-debug.apk
