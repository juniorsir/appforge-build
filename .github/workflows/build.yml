name: AppForge Cloud Build

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'Unique ID of the app to build'
        required: true
        type: string
      platform:
        description: 'android, ios, or both'
        required: true
        type: string
      project_category:
        description: 'web or native'
        required: true
        type: string
        default: 'web'
      project_type:
        description: 'Framework type (react, flutter, etc)'
        required: true
        type: string
        default: 'unknown'
      app_version:
        description: 'The semantic version of the app build'
        required: false
        type: string
        default: '1.0.0'
      sub_path:
        description: 'The sub-directory of the project within the monorepo'
        required: false
        type: string
        default: '.'

jobs:
  # ==========================================
  # 1. WEB APP BUILDER (Capacitor)
  # ==========================================
  build-android:
    if: inputs.project_category == 'web' && (inputs.platform == 'android' || inputs.platform == 'both')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Unzip Uploaded Source
        run: |
          TARGET_DIR="apps/${{ github.event.inputs.app_id }}"
          unzip -o "$TARGET_DIR/source.zip" -d app_workspace

      - name: Install JS Dependencies
        run: cd app_workspace && npm install

      - name: Build Web App
        run: cd app_workspace && npm run build --if-present
          
      - name: Add Android Platform
        run: |
          cd app_workspace
          npm install @capacitor/android
          npx cap add android

      - name: Capacitor Sync
        run: cd app_workspace && npx cap sync android

      - name: Auto-Inject Native Permissions
        env:
          APP_VERSION: ${{ inputs.app_version }}
        run: node ../scripts/inject-permissions.js
        working-directory: app_workspace

      - name: Build APK
        run: |
          cd app_workspace/android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appforge-apk-${{ github.event.inputs.app_id }}
          path: app_workspace/android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    if: inputs.project_category == 'web' && (inputs.platform == 'ios' || inputs.platform == 'both')
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Unzip Uploaded Source
        run: |
          TARGET_DIR="apps/${{ github.event.inputs.app_id }}"
          unzip -o "$TARGET_DIR/source.zip" -d app_workspace

      - name: Install JS Dependencies
        run: cd app_workspace && npm install

      - name: Build Web App
        run: cd app_workspace && npm run build --if-present
          
      - name: Add iOS Platform
        run: |
          cd app_workspace
          npm install @capacitor/ios
          npx cap add ios

      - name: Capacitor Sync
        run: cd app_workspace && npx cap sync ios

      - name: Zipping Xcode Project 
        run: cd app_workspace && zip -r ios-project.zip ios/
    
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appforge-ios-${{ github.event.inputs.app_id }}
          path: app_workspace/ios-project.zip

  # ==========================================
  # 2. FLUTTER BUILDER (FINAL VERSION)
  # ==========================================
  build-flutter:
    if: inputs.project_category == 'native' && inputs.project_type == 'flutter'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Flutter Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('**/pubspec.lock') }}
          
      - name: Unzip Uploaded Source
        run: unzip -o "apps/${{ inputs.app_id }}/source.zip" -d app_workspace

      - name: Set Project Directory
        id: set_project_dir
        run: |
          if [ "${{ inputs.sub_path }}" != "." ]; then
            echo "PROJECT_DIR=app_workspace/${{ inputs.sub_path }}" >> $GITHUB_ENV
          else
            echo "PROJECT_DIR=app_workspace" >> $GITHUB_ENV
          fi

      # --- CORRECTED ORDER & FIX ---
      # 1. Force Regeneration to fix 'app_plugin_loader' error
      - name: Force Regenerate Native Folders
        run: |
          cd ${{ env.PROJECT_DIR }}
          # Delete the old, broken native shell entirely
          rm -rf android/
          # Force Flutter to generate a brand new, modern shell
          flutter create --platforms=android .

      # 2. Install dependencies. This downloads all third-party plugins.
      - name: Install Dependencies
        run: cd ${{ env.PROJECT_DIR }} && flutter pub get

      - name: Fix Broken Plugins (Namespaces & Kotlin)
        run: |
          find app_workspace -name "build.gradle" -type f | while read file; do
            # 1. Fix missing namespaces
            if grep -q "com.android.library" "$file" && ! grep -q "namespace" "$file"; then
              manifest=$(dirname "$file")/src/main/AndroidManifest.xml
              if [ -f "$manifest" ]; then
                package_name=$(grep -oP 'package="\K[^"]+' "$manifest" || echo "com.example.plugin")
                sed -i "/android {/a \    namespace '${package_name}'" "$file"
              fi
            fi
            
            # 2. Prevent Kotlin warnings
            if grep -q "kotlin" "$file"; then
              echo "" >> "$file" 
              echo "tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach { kotlinOptions { suppressWarnings = true; allWarningsAsErrors = false } }" >> "$file"
            fi
          done
          
          # --- THE ULTIMATE KOTLIN SOURCE PATCH ---
          echo "Patching broken Kotlin source code in outdated plugins..."
          # This finds all .kt files in the pub-cache and replaces .toLowerCase(locale) with .lowercase()
          find ~/.pub-cache/hosted/ -name "*.kt" -type f -exec sed -i 's/\.toLowerCase(/.lowercase(/g' {} +
          find ~/.pub-cache/hosted/ -name "*.kt" -type f -exec sed -i 's/\.toUpperCase(/.uppercase(/g' {} +
          # ----------------------------------------
      
      # 4. Inject permissions AND version into the newly generated native files.
      - name: Auto-Inject App Permissions & Version
        env:
          APP_VERSION: ${{ inputs.app_version }}
          PROJECT_DIR: ${{ env.PROJECT_DIR }} 
          APP_NAME: ${{ inputs.app_name }}         # <-- Make sure these are here
          PACKAGE_ID: ${{ inputs.package_id }}
        run: node scripts/inject-permissions.js
      
      # --- ADD THIS NEW STEP RIGHT BEFORE 'Build Flutter APK' ---
      - name: Patch Gradle to use AppForge Metadata
        run: |
          cd ${{ env.PROJECT_DIR }}/android/app
          
          # 1. Patch applicationId
          sed -i 's/applicationId = .*/applicationId = localProperties.getProperty("flutter.applicationId")/' build.gradle.kts || true
          sed -i 's/applicationId .*/applicationId localProperties.getProperty("flutter.applicationId")/' build.gradle || true
          
          # 2. Patch resValue for App Name (This forces the launcher icon name)
          sed -i '/defaultConfig {/a \        resValue("string", "app_name", localProperties.getProperty("flutter.appName"))' build.gradle.kts || true
          sed -i '/defaultConfig {/a \        resValue "string", "app_name", localProperties.getProperty("flutter.appName")' build.gradle || true
      # --------------------------------------------------------
      # --- UPDATE THIS STEP ---
      - name: Build Flutter APK
        run: |
          cd ${{ env.PROJECT_DIR }}
          echo "Cleaning old C++ and Gradle caches..."
          flutter clean
          
          # 1. Force the App Version (For Flutter)
          # Flutter reads build-name and build-number natively from the CLI args
          BUILD_NAME="${{ inputs.app_version }}"
          BUILD_NUMBER=$(echo "${{ inputs.app_version }}" | awk -F. '{printf "%d%02d%02d\n", $1, $2, $3}')
          
          # 2. Force the Package ID (For Android/Gradle)
          # We write this into local.properties so Gradle can read it
          echo "flutter.applicationId=${{ inputs.package_id }}" >> android/local.properties
          
          # 3. Force the App Name (For Android/Gradle)
          # We write this into local.properties so Gradle can read it
          echo "flutter.appName=${{ inputs.app_name }}" >> android/local.properties
          
          echo "Building APK for ${{ inputs.app_name }} (${{ inputs.package_id }}) v${BUILD_NAME}..."
          
          # 4. We MUST pass the build-name and build-number directly to the compiler!
          flutter build apk --debug --build-name=$BUILD_NAME --build-number=$BUILD_NUMBER
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appforge-apk-${{ github.event.inputs.app_id }}
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-debug.apk
  # ==========================================
  # 3. NATIVE ANDROID (Kotlin/Java) BUILDER
  # ==========================================
  build-native-android:
    if: inputs.project_category == 'native' && inputs.project_type == 'android_native'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'
          
      - name: Unzip Uploaded Source
        run: |
          TARGET_DIR="apps/${{ github.event.inputs.app_id }}"
          unzip -o "$TARGET_DIR/source.zip" -d app_workspace
          
      - name: Build Native APK
        run: |
          cd app_workspace
          chmod +x ./gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appforge-apk-${{ github.event.inputs.app_id }}
          path: app_workspace/app/build/outputs/apk/debug/*.apk
