name: AppForge Cloud Build

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'Unique ID of the app to build'
        required: true
        type: string
      platform:
        description: 'android, ios, or both'
        required: true
        type: string
      project_category:
        description: 'web or native'
        required: true
        type: string
        default: 'web'
      project_type:
        description: 'Framework type (react, flutter, etc)'
        required: true
        type: string
        default: 'unknown'
      app_version:
        description: 'The semantic version of the app build'
        required: false
        type: string
        default: '1.0.0'
      sub_path:
        description: 'The sub-directory of the project within the monorepo'
        required: false
        type: string
        default: '.'

jobs:
  # ==========================================
  # 1. WEB APP BUILDER (Capacitor)
  # ==========================================
  build-android:
    if: inputs.project_category == 'web' && (inputs.platform == 'android' || inputs.platform == 'both')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Unzip Uploaded Source
        run: |
          TARGET_DIR="apps/${{ github.event.inputs.app_id }}"
          unzip -o "$TARGET_DIR/source.zip" -d app_workspace

      - name: Install JS Dependencies
        run: cd app_workspace && npm install

      - name: Build Web App
        run: cd app_workspace && npm run build --if-present
          
      - name: Add Android Platform
        run: |
          cd app_workspace
          npm install @capacitor/android
          npx cap add android

      - name: Capacitor Sync
        run: cd app_workspace && npx cap sync android

      - name: Auto-Inject Native Permissions
        env:
          APP_VERSION: ${{ inputs.app_version }}
        run: node ../scripts/inject-permissions.js
        working-directory: app_workspace

      - name: Build APK
        run: |
          cd app_workspace/android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appforge-apk-${{ github.event.inputs.app_id }}
          path: app_workspace/android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    if: inputs.project_category == 'web' && (inputs.platform == 'ios' || inputs.platform == 'both')
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Unzip Uploaded Source
        run: |
          TARGET_DIR="apps/${{ github.event.inputs.app_id }}"
          unzip -o "$TARGET_DIR/source.zip" -d app_workspace

      - name: Install JS Dependencies
        run: cd app_workspace && npm install

      - name: Build Web App
        run: cd app_workspace && npm run build --if-present
          
      - name: Add iOS Platform
        run: |
          cd app_workspace
          npm install @capacitor/ios
          npx cap add ios

      - name: Capacitor Sync
        run: cd app_workspace && npx cap sync ios

      - name: Zipping Xcode Project 
        run: cd app_workspace && zip -r ios-project.zip ios/
    
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appforge-ios-${{ github.event.inputs.app_id }}
          path: app_workspace/ios-project.zip

   # ==========================================
  # 2. FLUTTER BUILDER
  # ==========================================
  build-flutter:
    if: inputs.project_category == 'native' && inputs.project_type == 'flutter'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ runner.tool_cache }}/flutter
          key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          
      - name: Unzip Uploaded Source
        run: |
          TARGET_DIR="apps/${{ github.event.inputs.app_id }}"
          unzip -o "$TARGET_DIR/source.zip" -d app_workspace

      - name: Navigate to Sub-Project
        run: |
          # If a sub_path was provided, cd into it. Otherwise, stay in the root.
          if [ "${{ inputs.sub_path }}" != "." ]; then
            echo "Navigating to sub-project at app_workspace/${{ inputs.sub_path }}"
            cd "app_workspace/${{ inputs.sub_path }}"
          else
            cd app_workspace
          fi
          echo "PROJECT_DIR=$(pwd)" >> $GITHUB_ENV
      - name: Detect Flutter Project
        run: |
         PROJECT_DIR=$(find app_workspace -name pubspec.yaml | head -n 1 | xargs dirname)
         echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
         echo "Detected Flutter project at $PROJECT_DIR"

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android NDK
        run: |
          echo "Installing latest stable Android NDK..."
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393"
          echo "ndk.dir=$ANDROID_HOME/ndk/25.1.8937393" >> $PROJECT_DIR/android/local.properties
      # --- THE ULTIMATE FIX ---
      - name: Force Regenerate Native Folders
        run: |
          cd $PROJECT_DIR
          echo "Deleting outdated Android shell..."
          rm -rf android/
          echo "Generating brand new, modern Android shell..."
          flutter create --platforms=android .
      # ------------------------

      - name: Install Dependencies
        run: cd $PROJECT_DIR && flutter pub get

      # --- THE ULTIMATE PLUGIN FIXER ---
      - name: Fix Broken Plugin Namespaces
        run: |
          echo "Scanning for broken plugins missing namespaces..."
          find app_workspace -name "build.gradle" -type f | while read file; do
            if grep -q "com.android.library" "$file"; then
              if ! grep -q "namespace" "$file"; then
                manifest=$(dirname "$file")/src/main/AndroidManifest.xml
                if [ -f "$manifest" ]; then
                  package_name=$(grep -oP 'package="\K[^"]+' "$manifest" || echo "com.example.plugin")
                  sed -i "/android {/a \    namespace '${package_name}'" "$file"
                fi
              fi
            fi
          done
      # --------------------------------
      - name: Fix File Timestamps for C++ (Ninja Bug)
        run: |
          echo "Updating file timestamps to fix Ninja infinite loop..."
          find app_workspace -type f -exec touch {} +

      # --- ADD THIS NEW STEP ---
      - name: Patch Broken C++ Plugins (Pedometer)
        run: |
          echo "Patching CMake paths in broken plugins..."
          
          # Find all plugin build.gradle files
          find app_workspace -name "build.gradle" -type f | while read file; do
            # If the plugin is trying to use C++ (CMake)
            if grep -q "externalNativeBuild" "$file"; then
              echo "Patching C++ configuration in: $file"
              
              # Force the plugin to use the safe version of CMake (3.22.1)
              # This stops it from downloading broken versions of Ninja
              sed -i '/externalNativeBuild {/a \        cmake { version "3.22.1" }' "$file"
            fi
          done

      # --- UPDATE THIS STEP IN YOUR FLUTTER JOB ---
      - name: Auto-Inject Native Permissions & Version
        env:
          APP_VERSION: ${{ inputs.app_version }}
          PROJECT_DIR: ${{ env.PROJECT_DIR }} 
        run: |
          # Use ../ to go UP one level from app_workspace to find the scripts folder!
          node ../scripts/inject-permissions.js
        working-directory: app_workspace
      - name: Build Flutter APK
        run: |
          cd $PROJECT_DIR
          echo "Cleaning old C++ and Gradle caches..."
          flutter clean
          flutter pub get
          echo "Building APK..."
          flutter build apk --debug
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appforge-apk-${{ github.event.inputs.app_id }}
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-debug.apk
  # ==========================================
  # 3. NATIVE ANDROID (Kotlin/Java) BUILDER
  # ==========================================
  build-native-android:
    if: inputs.project_category == 'native' && inputs.project_type == 'android_native'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Unzip Uploaded Source
        run: |
          TARGET_DIR="apps/${{ github.event.inputs.app_id }}"
          unzip -o "$TARGET_DIR/source.zip" -d app_workspace
          
      - name: Build Native APK
        run: |
          cd app_workspace
          chmod +x ./gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appforge-apk-${{ github.event.inputs.app_id }}
          path: app_workspace/app/build/outputs/apk/debug/*.apk
